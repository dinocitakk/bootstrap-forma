<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bootstrap Forma</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-5">
<h2 class="mb-4">Kontakt forma</h2>

<form>

<div class="mb-3">
<label class="form-label">Ime</label>
<input type="text" class="form-control" placeholder="Unesite ime">
</div>

<div class="mb-3">
<label class="form-label">Prezime</label>
<input type="text" class="form-control" placeholder="Unesite prezime">
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control" placeholder="Unesite email">
</div>

<div class="mb-3">
<label class="form-label">Password</label>
<input type="password" class="form-control" placeholder="Unesite lozinku">
</div>

<div class="mb-3">
<label class="form-label">Telefon</label>
<input type="tel" class="form-control" placeholder="Unesite telefon">
</div>

<div class="mb-3">
<label class="form-label">Grad</label>
<select class="form-select">
<option>Izaberite grad</option>
<option>Sarajevo</option>
<option>Banja Luka</option>
<option>Mostar</option>
<option>Tuzla</option>
</select>
</div>

<div class="mb-3">
<label class="form-label">Poruka</label>
<textarea class="form-control" rows="4"></textarea>
</div>

<button type="submit" class="btn btn-primary">Pošalji</button>

</form>
</div>

</body>
</html>
